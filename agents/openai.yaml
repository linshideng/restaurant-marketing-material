display_name: 餐饮营销物料
short_description: 生成二维码安全的餐饮 AI 海报 PNG，支持美团/点评平台 Logo 后合成，QR 由后合成管线填充。
default_prompt: 用 restaurant_marketing_material 生成餐饮营销物料前，先确认物料类型和尺寸；尺寸选项里把“自定义宽高像素”放在第一位，并明确用户可输入如 1242×1660px 或“宽1242高1660像素”。普通物料还要确认平台品牌标识：默认展示并自动选择美团/美团团购，用户明确大众点评/点评时使用点评 Logo，用户也可选择不展示。物料严禁出现未经授权的赛事/联盟/影视动画/动漫游戏专有 IP，例如世界杯/FIFA/NBA/奥运/迪士尼/漫威/宝可梦等名称、logo、角色、奖杯、会徽、吉祥物、队徽球衣；命中时改为“看球”“球赛”“篮球赛”“运动会”“童趣”等中性表达。默认要求二维码，如用户上传二维码就直接使用附件。AI 生成完整商业海报（含背景、布局、展示文字和 QR 宿主区域），二维码由 qr_enhance + qr_composite 管线后合成，并输出预览和审核报告。
